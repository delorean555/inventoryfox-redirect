<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Şifre Sıfırlama – Inventory Fox</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f1117; color: #ffffff;
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 24px;
        }
        .card {
            background: #1c1f2e; border-radius: 20px; padding: 48px 32px;
            max-width: 400px; width: 100%; text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .icon { font-size: 64px; margin-bottom: 24px; }
        h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
        p { font-size: 15px; color: #9ca3af; line-height: 1.6; margin-bottom: 32px; }
        .btn {
            display: inline-block; background: #6366f1; color: white;
            text-decoration: none; padding: 14px 32px; border-radius: 12px;
            font-size: 15px; font-weight: 600; width: 100%;
        }
        .btn:hover { background: #4f46e5; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🔑</div>
        <h1>Şifre Sıfırlama</h1>
        <p>Yeni şifrenizi belirlemek için uygulamaya yönlendiriliyorsunuz.</p>
        <a id="btn" class="btn" href="inventoryfox://auth/recovery">Uygulamayı Aç</a>
    </div>
    <script>
        function openApp() {
            var params = window.location.search;
            var fragment = window.location.hash;
            window.location.replace("inventoryfox://auth/recovery" + params + fragment);
        }
        window.onload = function() {
            openApp();
            document.getElementById('btn').href =
                "inventoryfox://auth/recovery" + window.location.search + window.location.hash;
        };
    </script>
</body>
</html>
