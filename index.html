<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-posta Onaylandı – Inventory Fox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f1117;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .card {
      background: #1c1f2e;
      border-radius: 20px;
      padding: 48px 32px;
      max-width: 400px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .icon { font-size: 64px; margin-bottom: 24px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 12px; }
    p { font-size: 15px; color: #9ca3af; line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block;
      background: #6366f1;
      color: white;
      text-decoration: none;
      padding: 14px 32px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn:hover { background: #4f46e5; }
  </style>
  <script>
    function openApp() {
      var params = window.location.search;
      var fragment = window.location.hash;
      window.location.replace("inventoryfox://auth/callback" + params + fragment);
    }
    window.onload = function() {
      openApp();
      document.getElementById('btn').href =
        "inventoryfox://auth/callback" + window.location.search + window.location.hash;
    };
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">✅</div>
    <h1>E-posta Onaylandı!</h1>
    <p>Hesabınız başarıyla doğrulandı.<br>Inventory Fox uygulamasına yönlendiriliyorsunuz.</p>
    <a id="btn" href="inventoryfox://auth/callback" class="btn">Uygulamayı Aç</a>
  </div>
</body>
</html>
